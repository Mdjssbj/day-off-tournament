<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Off Tournament</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071226;
color:white;
padding:18px;
}

.wrap{
max-width:1450px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:18px;
}

h1{
font-size:40px;
font-weight:900;
background:linear-gradient(90deg,#18f7a0,#44a4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#97afe4;
font-size:15px;
margin-top:6px;
}

.tgBtn{
padding:12px 22px;
border-radius:14px;
background:linear-gradient(90deg,#4d8dff,#3974ff);
color:white;
text-decoration:none;
font-size:15px;
font-weight:700;
}

.card{
background:#0b1733;
padding:22px;
border-radius:24px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.label{
font-size:14px;
color:#9fb7ec;
margin-bottom:6px;
}

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#1d2d55;
color:white;
font-size:16px;
}

button{
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.mainBtn{
background:linear-gradient(90deg,#2f72ff,#8b2dff);
color:white;
}

.redBtn{
background:#ff5267;
color:white;
}

.grayBtn{
background:#31446f;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:20px;
}

.stat{
background:#091327;
padding:22px;
border-radius:22px;
text-align:center;
}

.big{
font-size:36px;
font-weight:900;
margin-bottom:8px;
}

.small{
font-size:14px;
color:#9db6ea;
}

.tableWrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th,td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:14px;
}

th{
color:#8eb7ff;
}

.green{
color:#18f7a0;
font-weight:700;
}

.red{
color:#ff6678;
font-weight:700;
}

.chart{
height:240px;
background:#091327;
border-radius:22px;
padding:18px;
display:flex;
align-items:flex-end;
gap:10px;
overflow-x:auto;
}

.bar{
min-width:48px;
border-radius:12px 12px 0 0;
position:relative;
}

.bar.greenBar{
background:linear-gradient(180deg,#18f7a0,#2f72ff);
}

.bar.redBar{
background:linear-gradient(180deg,#ff6678,#ff2f55);
}

.bar span{
position:absolute;
bottom:-26px;
left:50%;
transform:translateX(-50%);
font-size:11px;
color:#9eb6ea;
}

.footer{
text-align:center;
margin-top:16px;
font-size:14px;
color:#8ea6db;
}

@media(max-width:768px){

body{
padding:12px;
}

h1{
font-size:30px;
}

.sub{
font-size:13px;
}

.big{
font-size:28px;
}

input,button{
font-size:15px;
padding:14px;
}

th,td{
font-size:12px;
padding:10px;
}

}
</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div>
<h1>DAY OFF TOURNAMENT</h1>
<div class="sub">Турнірна система трейдера</div>
</div>

<a href="https://t.me/+JxZLoij59XBmNTBi" target="_blank" class="tgBtn">
Telegram
</a>

</div>

<div class="card">

<div class="grid">

<div>
<div class="label">📅 Дата</div>
<input id="date" type="date">
</div>

<div>
<div class="label">💰 Результат дня</div>
<input id="result" placeholder="+20 або -15">
</div>

<div>
<div class="label">🧠 Стратегія</div>
<input id="strategy" placeholder="Впиши стратегію">
</div>

<div>
<div class="label">📌 Нотатка</div>
<input id="note" placeholder="Додаткова інформація">
</div>

<button class="mainBtn" onclick="addDay()">Додати день</button>

<button class="grayBtn" onclick="exportCSV()">Export CSV</button>

<button class="redBtn" onclick="resetAll()">Очистити</button>

</div>

</div>

<div class="stats">

<div class="stat">
<div class="big" id="pnlBox">0</div>
<div class="small">Загальний PNL</div>
</div>

<div class="stat">
<div class="big" id="roiBox">0%</div>
<div class="small">ROI</div>
</div>

<div class="stat">
<div class="big" id="wrBox">0%</div>
<div class="small">Відсоток перемог</div>
</div>

<div class="stat">
<div class="big" id="streakBox">0</div>
<div class="small">Серія перемог</div>
</div>

<div class="stat">
<div class="big" id="scoreBox">0</div>
<div class="small">Турнірні очки</div>
</div>

<div class="stat">
<div class="big" id="rankBox">Bronze</div>
<div class="small">Ранг</div>
</div>

</div>

<div class="card">

<h2 style="margin-bottom:18px;">Результати днів</h2>

<div class="chart" id="chart"></div>

</div>

<div class="card">

<h2 style="margin-bottom:18px;">Історія днів</h2>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Дата</th>
<th>Результат</th>
<th>Баланс дня</th>
<th>Стратегія</th>
<th>Нотатка</th>
</tr>
</thead>

<tbody id="historyRows"></tbody>

</table>

</div>

</div>

<div class="footer">
Day Off
</div>

</div>

<script>

let historyData = JSON.parse(localStorage.getItem("dayOffTournamentV5") || "[]");

let totalPNL = 0;
let roi = 0;
let wr = 0;
let streak = 0;
let score = 0;

function addDay(){

let item = {
date:date.value,
result:Number(result.value),
strategy:strategy.value,
note:note.value
};

if(!item.date || isNaN(item.result) || !item.strategy) return;

item.dayBalance = 100 + item.result;

historyData.push(item);

calculateStats();
renderAll();
saveAll();

result.value="";
strategy.value="";
note.value="";
}

function calculateStats(){

totalPNL = 0;

let wins = 0;
let currentStreak = 0;
let bestStreak = 0;

for(let i=0;i<historyData.length;i++){

totalPNL += historyData[i].result;

if(historyData[i].result > 0){

wins++;
currentStreak++;

}else{

currentStreak = 0;

}

if(currentStreak > bestStreak){
bestStreak = currentStreak;
}

}

streak = bestStreak;

roi = historyData.length ?
(totalPNL / (historyData.length * 100)) * 100 : 0;

wr = historyData.length ?
(wins / historyData.length) * 100 : 0;

score =
totalPNL * 0.6 +
roi * 0.3 +
wr * 0.1;

}

function getRank(){

if(score >= 500) return "Diamond";
if(score >= 350) return "Platinum";
if(score >= 250) return "Gold";
if(score >= 120) return "Silver";

return "Bronze";

}

function renderStats(){

pnlBox.innerText = totalPNL.toFixed(0);

roiBox.innerText = roi.toFixed(1)+"%";

wrBox.innerText = wr.toFixed(1)+"%";

streakBox.innerText = streak;

scoreBox.innerText = score.toFixed(1);

rankBox.innerText = getRank();

}

function renderHistory(){

let html = "";

for(let i=0;i<historyData.length;i++){

let x = historyData[i];

html += `
<tr>

<td>${i+1}</td>

<td>${x.date}</td>

<td class="${x.result>=0?'green':'red'}">
${x.result>=0?'+':''}${x.result}
</td>

<td>${x.dayBalance.toFixed(0)}</td>

<td>${x.strategy}</td>

<td>${x.note || '-'}</td>

</tr>
`;

}

historyRows.innerHTML = html;

}

function renderChart(){

let html = "";

for(let i=0;i<historyData.length;i++){

let x = historyData[i];

let h = Math.abs(x.result) * 3;

if(h < 20) h = 20;

html += `
<div class="bar ${x.result>=0?'greenBar':'redBar'}"
style="height:${h}px">

<span>${i+1}</span>

</div>
`;

}

chart.innerHTML = html;

}

function renderAll(){

calculateStats();

renderStats();

renderHistory();

renderChart();

}

function saveAll(){

localStorage.setItem(
"dayOffTournamentV5",
JSON.stringify(historyData)
);

}

function resetAll(){

if(confirm("Очистити всі дані?")){

localStorage.removeItem("dayOffTournamentV5");

location.reload();

}

}

function exportCSV(){

let rows =
"Дата;Результат;Баланс дня;Стратегія;Нотатка\\r\\n";

for(let i=0;i<historyData.length;i++){

rows +=
`${historyData[i].date};${historyData[i].result};${historyData[i].dayBalance};${historyData[i].strategy};${historyData[i].note}\\r\\n`;

}

let csv = "\\uFEFF"+rows;

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "dayoff-results.csv";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

renderAll();

</script>

</body>
</html>
