<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAY OFF</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071226;
color:white;
padding:16px;
}

.wrap{
max-width:1400px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
gap:16px;
flex-wrap:wrap;
}

.title{
font-size:34px;
font-weight:900;
background:linear-gradient(90deg,#18f7a0,#44a4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
font-size:14px;
color:#8fa9de;
margin-top:4px;
}

.tgBtn{
padding:12px 20px;
border-radius:14px;
background:linear-gradient(90deg,#4d8dff,#3974ff);
color:white;
text-decoration:none;
font-size:14px;
font-weight:700;
}

.card{
background:#0b1733;
border-radius:24px;
padding:20px;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.label{
font-size:13px;
color:#9eb7ea;
margin-bottom:6px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:#1c2b53;
color:white;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.01);
}

.mainBtn{
background:linear-gradient(90deg,#2f72ff,#8b2dff);
color:white;
}

.grayBtn{
background:#31446f;
color:white;
}

.redBtn{
background:#ff5368;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-bottom:18px;
}

.stat{
background:#091327;
padding:22px;
border-radius:22px;
text-align:center;
}

.big{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.small{
font-size:13px;
color:#9eb6ea;
}

.tableWrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:13px;
}

th{
color:#8db6ff;
font-weight:700;
}

.green{
color:#18f7a0;
font-weight:700;
}

.red{
color:#ff6678;
font-weight:700;
}

.chart{
height:180px;
display:flex;
align-items:flex-end;
gap:8px;
padding:18px;
overflow-x:auto;
background:#091327;
border-radius:22px;
}

.bar{
min-width:38px;
border-radius:10px 10px 0 0;
position:relative;
}

.greenBar{
background:linear-gradient(180deg,#18f7a0,#2f72ff);
}

.redBar{
background:linear-gradient(180deg,#ff6678,#ff2f55);
}

.bar span{
position:absolute;
bottom:-22px;
left:50%;
transform:translateX(-50%);
font-size:10px;
color:#98b3e8;
}

.section{
font-size:18px;
font-weight:700;
margin-bottom:16px;
}

.footer{
margin-top:14px;
text-align:center;
font-size:13px;
color:#8ca5da;
}

@media(max-width:768px){

.title{
font-size:28px;
}

.big{
font-size:28px;
}

input,button{
font-size:14px;
padding:14px;
}

th,td{
font-size:12px;
padding:10px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div>
<div class="title">DAY OFF</div>
<div class="sub">Турнірна система трейдера</div>
</div>

<a
href="https://t.me/+JxZLoij59XBmNTBi"
target="_blank"
class="tgBtn">
Telegram
</a>

</div>

<div class="card">

<div class="grid">

<div>
<div class="label">📅 Дата</div>
<input id="date" type="date">
</div>

<div>
<div class="label">💰 Результат дня</div>
<input id="result" placeholder="+20 або -15">
</div>

<div>
<div class="label">🧠 Стратегія</div>
<input id="strategy" placeholder="Впиши стратегію">
</div>

<div>
<div class="label">📌 Висновок</div>
<input id="note" placeholder="Що було добре / погано">
</div>

<div style="display:flex;align-items:end;">
<button class="mainBtn" onclick="addDay()">
Додати день
</button>
</div>

<div style="display:flex;align-items:end;">
<button class="grayBtn" onclick="exportCSV()">
Експорт Excel
</button>
</div>

<div style="display:flex;align-items:end;">
<button class="redBtn" onclick="resetAll()">
Очистити
</button>
</div>

</div>

</div>

<div class="stats">

<div class="stat">
<div class="big" id="pnlBox">0</div>
<div class="small">Сумарний результат</div>
</div>

<div class="stat">
<div class="big" id="avgBox">0</div>
<div class="small">Середній результат</div>
</div>

<div class="stat">
<div class="big" id="wrBox">0%</div>
<div class="small">Відсоток перемог</div>
</div>

<div class="stat">
<div class="big" id="streakBox">0</div>
<div class="small">Серія перемог</div>
</div>

</div>

<div class="card">

<div class="section">
Результати днів
</div>

<div class="chart" id="chart"></div>

</div>

<div class="card">

<div class="section">
Історія днів
</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>#</th>
<th>Дата</th>
<th>Результат</th>
<th>Баланс дня</th>
<th>Стратегія</th>
<th>Висновок</th>
</tr>

</thead>

<tbody id="historyRows"></tbody>

</table>

</div>

</div>

<div class="footer">
Day Off
</div>

</div>

<script>

let historyData =
JSON.parse(
localStorage.getItem("dayOffTournamentV10")
|| "[]"
);

let totalPNL = 0;
let avg = 0;
let wr = 0;
let streak = 0;

function addDay(){

let d =
document.getElementById("date").value;

let r =
Number(
document.getElementById("result").value
);

let s =
document.getElementById("strategy").value;

let n =
document.getElementById("note").value;

if(!d || isNaN(r) || s.trim()===""){
return;
}

let item = {
date:d,
result:r,
strategy:s,
note:n,
dayBalance:100+r
};

historyData.push(item);

calculateStats();

renderAll();

saveAll();

document.getElementById("result").value="";
document.getElementById("strategy").value="";
document.getElementById("note").value="";

}

function calculateStats(){

totalPNL = 0;

let wins = 0;

let currentStreak = 0;

let bestStreak = 0;

for(let i=0;i<historyData.length;i++){

totalPNL += historyData[i].result;

if(historyData[i].result > 0){

wins++;

currentStreak++;

}else{

currentStreak = 0;

}

if(currentStreak > bestStreak){

bestStreak = currentStreak;

}

}

streak = bestStreak;

avg =
historyData.length ?
(totalPNL/historyData.length) : 0;

wr =
historyData.length ?
(wins/historyData.length)*100 : 0;

}

function renderStats(){

document.getElementById("pnlBox")
.innerText =
totalPNL.toFixed(0);

document.getElementById("avgBox")
.innerText =
avg.toFixed(1);

document.getElementById("wrBox")
.innerText =
wr.toFixed(1)+"%";

document.getElementById("streakBox")
.innerText =
streak;

}

function renderHistory(){

let html = "";

for(let i=0;i<historyData.length;i++){

let x = historyData[i];

html += `
<tr>

<td>${i+1}</td>

<td>${x.date}</td>

<td class="${x.result>=0?'green':'red'}">
${x.result>=0?'+':''}${x.result}
</td>

<td>${x.dayBalance}</td>

<td>${x.strategy}</td>

<td>${x.note || '-'}</td>

</tr>
`;

}

document.getElementById("historyRows")
.innerHTML = html;

}

function renderChart(){

let html = "";

for(let i=0;i<historyData.length;i++){

let x = historyData[i];

let h = Math.abs(x.result)*3;

if(h<20){
h=20;
}

html += `
<div class="bar ${x.result>=0?'greenBar':'redBar'}"
style="height:${h}px">

<span>${i+1}</span>

</div>
`;

}

document.getElementById("chart")
.innerHTML = html;

}

function renderAll(){

calculateStats();

renderStats();

renderHistory();

renderChart();

}

function saveAll(){

localStorage.setItem(
"dayOffTournamentV10",
JSON.stringify(historyData)
);

}

function resetAll(){

if(confirm("Очистити всі дані?")){

localStorage.removeItem(
"dayOffTournamentV10"
);

location.reload();

}

}

function exportCSV(){

let table = `
<table border="1">
<tr>
<th>Дата</th>
<th>Результат</th>
<th>Баланс дня</th>
<th>Стратегія</th>
<th>Висновок</th>
</tr>
`;

for(let i=0;i<historyData.length;i++){

table += `
<tr>
<td>${historyData[i].date}</td>
<td>${historyData[i].result}</td>
<td>${historyData[i].dayBalance}</td>
<td>${historyData[i].strategy}</td>
<td>${historyData[i].note}</td>
</tr>
`;

}

table += `</table>`;

let html = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:x="urn:schemas-microsoft-com:office:excel"
xmlns="http://www.w3.org/TR/REC-html40">

<head>
<meta charset="UTF-8">
</head>

<body>
${table}
</body>
</html>
`;

let blob = new Blob(
[html],
{
type:"application/vnd.ms-excel"
}
);

let link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"dayoff-results.xls";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

renderAll();

</script>

</body>
</html>
