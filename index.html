<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Off Tournament</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071226;
color:#fff;
padding:20px;
}

.wrap{
max-width:1450px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:20px;
position:relative;
}

h1{
font-size:42px;
font-weight:900;
background:linear-gradient(90deg,#19f7a0,#44a4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#97afe4;
margin-top:8px;
font-size:16px;
}

.tgBtn{
position:absolute;
top:0;
right:0;
padding:12px 22px;
border-radius:14px;
background:linear-gradient(90deg,#4d8dff,#3974ff);
color:white;
text-decoration:none;
font-size:16px;
font-weight:700;
}

.card{
background:#0b1733;
padding:24px;
border-radius:24px;
margin-bottom:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.label{
font-size:14px;
color:#9fb7ec;
margin-bottom:6px;
}

input,select{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#1d2d55;
color:white;
font-size:17px;
}

button{
padding:16px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.mainBtn{
background:linear-gradient(90deg,#2f72ff,#8b2dff);
color:white;
}

.redBtn{
background:#ff5267;
color:white;
}

.grayBtn{
background:#31446f;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:22px;
}

.stat{
background:#091327;
padding:24px;
border-radius:22px;
text-align:center;
}

.big{
font-size:38px;
font-weight:900;
margin-bottom:8px;
}

.small{
color:#9eb6e8;
font-size:15px;
}

.tableWrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

th,td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:15px;
}

th{
color:#8fb6ff;
}

.green{
color:#18f7a0;
font-weight:700;
}

.red{
color:#ff6475;
font-weight:700;
}

.chart{
height:240px;
background:#091327;
border-radius:22px;
display:flex;
align-items:flex-end;
gap:10px;
padding:20px;
overflow-x:auto;
margin-top:20px;
}

.bar{
min-width:42px;
background:linear-gradient(180deg,#18f7a0,#2f72ff);
border-radius:10px 10px 0 0;
position:relative;
}

.bar span{
position:absolute;
bottom:-24px;
left:50%;
transform:translateX(-50%);
font-size:11px;
color:#9db7ec;
}

.footer{
text-align:center;
margin-top:18px;
color:#8fa7db;
font-size:14px;
}

@media(max-width:768px){

body{
padding:14px;
}

h1{
font-size:30px;
}

.sub{
font-size:14px;
}

.tgBtn{
position:relative;
top:auto;
right:auto;
font-size:14px;
padding:10px 16px;
}

.big{
font-size:30px;
}

input,select,button{
font-size:15px;
padding:14px;
}

th,td{
font-size:13px;
padding:10px;
}

}
</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div>
<h1>DAY OFF TOURNAMENT</h1>
<div class="sub">Турнірна система трейдера</div>
</div>

<a href="https://t.me/+JxZLoij59XBmNTBi" target="_blank" class="tgBtn">
Telegram
</a>

</div>

<div class="card">

<div class="grid">

<div>
<div class="label">📅 Дата</div>
<input id="date" type="date">
</div>

<div>
<div class="label">💰 Результат дня</div>
<input id="result" placeholder="+25 або -15">
</div>

<div>
<div class="label">🧠 Стратегія</div>
<input id="strategy" placeholder="Впиши стратегію">
</div>

<div>
<div class="label">🌍 Сесія</div>
<select id="session">
<option value="">Обрати</option>
<option>Лондон</option>
<option>Нью-Йорк</option>
<option>Азія</option>
</select>
</div>

<div>
<div class="label">📌 Нотатка</div>
<input id="note" placeholder="Додаткова інформація">
</div>

<button class="mainBtn" onclick="addDay()">Додати день</button>

<button class="grayBtn" onclick="exportCSV()">Export CSV</button>

<button class="redBtn" onclick="resetAll()">Очистити</button>

</div>

</div>

<div class="stats">

<div class="stat">
<div class="big" id="balanceBox">100</div>
<div class="small">Баланс</div>
</div>

<div class="stat">
<div class="big" id="roiBox">0%</div>
<div class="small">ROI</div>
</div>

<div class="stat">
<div class="big" id="wrBox">0%</div>
<div class="small">Winrate</div>
</div>

<div class="stat">
<div class="big" id="streakBox">0</div>
<div class="small">Серія перемог</div>
</div>

<div class="stat">
<div class="big" id="scoreBox">0</div>
<div class="small">Tournament Score</div>
</div>

<div class="stat">
<div class="big" id="rankBox">Bronze</div>
<div class="small">Ранг</div>
</div>

</div>

<div class="card">

<h2 style="margin-bottom:18px;">Графік балансу</h2>

<div class="chart" id="chart"></div>

</div>

<div class="card">

<h2 style="margin-bottom:18px;">Історія днів</h2>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Дата</th>
<th>Результат</th>
<th>Баланс</th>
<th>Стратегія</th>
<th>Сесія</th>
<th>Нотатка</th>
</tr>
</thead>

<tbody id="historyRows"></tbody>

</table>

</div>

</div>

<div class="footer">
Day Off
</div>

</div>

<script>

let historyData = JSON.parse(localStorage.getItem("dayOffTournamentV4") || "[]");

let balance = 100;
let roi = 0;
let wr = 0;
let streak = 0;
let score = 0;

function addDay(){

let item = {
date:date.value,
result:Number(result.value),
strategy:strategy.value,
session:session.value,
note:note.value
};

if(!item.date || isNaN(item.result) || !item.strategy || !item.session) return;

balance += item.result;

item.balance = balance;

historyData.push(item);

calculateStats();
renderAll();
saveAll();

result.value="";
strategy.value="";
session.value="";
note.value="";
}

function calculateStats(){

balance = 100;

let wins = 0;
let currentStreak = 0;
let bestStreak = 0;

for(let i=0;i<historyData.length;i++){

balance += historyData[i].result;

historyData[i].balance = balance;

if(historyData[i].result > 0){
wins++;
currentStreak++;
}else{
currentStreak=0;
}

if(currentStreak>bestStreak){
bestStreak=currentStreak;
}

}

streak = bestStreak;

roi = ((balance-100)/100)*100;

wr = historyData.length ?
(wins/historyData.length)*100 : 0;

score =
balance*0.6 +
roi*0.3 +
wr*0.1;

}

function getRank(){

if(score>=500) return "Diamond";
if(score>=350) return "Platinum";
if(score>=250) return "Gold";
if(score>=150) return "Silver";
return "Bronze";

}

function renderStats(){

balanceBox.innerText = balance.toFixed(0);
roiBox.innerText = roi.toFixed(1)+"%";
wrBox.innerText = wr.toFixed(1)+"%";
streakBox.innerText = streak;
scoreBox.innerText = score.toFixed(1);
rankBox.innerText = getRank();

}

function renderHistory(){

let html="";

for(let i=0;i<historyData.length;i++){

let x = historyData[i];

html += `
<tr>
<td>${i+1}</td>
<td>${x.date}</td>
<td class="${x.result>=0?'green':'red'}">
${x.result>=0?'+':''}${x.result}
</td>
<td>${x.balance.toFixed(0)}</td>
<td>${x.strategy}</td>
<td>${x.session}</td>
<td>${x.note || '-'}</td>
</tr>
`;

}

historyRows.innerHTML = html;

}

function renderChart(){

let html="";

for(let i=0;i<historyData.length;i++){

let h = Math.max(historyData[i].balance,20);

html += `
<div class="bar" style="height:${h}px">
<span>${i+1}</span>
</div>
`;

}

chart.innerHTML = html;

}

function renderAll(){

calculateStats();
renderStats();
renderHistory();
renderChart();

}

function saveAll(){

localStorage.setItem("dayOffTournamentV4",JSON.stringify(historyData));

}

function resetAll(){

if(confirm("Очистити всі дані?")){

localStorage.removeItem("dayOffTournamentV4");
location.reload();

}

}

function exportCSV(){

let rows = "Дата;Результат;Баланс;Стратегія;Сесія;Нотатка\\r\\n";

for(let i=0;i<historyData.length;i++){

rows += `${historyData[i].date};${historyData[i].result};${historyData[i].balance};${historyData[i].strategy};${historyData[i].session};${historyData[i].note}\\r\\n`;

}

let csv = "\\uFEFF"+rows;

let blob = new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "dayoff-tournament.csv";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

renderAll();

</script>

</body>
</html>
